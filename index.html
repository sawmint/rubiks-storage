<!doctype html>
<html lang="en">
<!-- if site is not updating even if it seemed to push, https://github.com/sawmint/rubiks-storage/actions -->
<!-- in sw.js there is a line 'const CACHE_VERSION = "rs-v1";' if update not updating, change the version number -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#4b6bff" />
  <title>Rubik's Storage - CFOP Algorithm Browser</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="logo-cube.png" />
  <link rel="apple-touch-icon" href="logo-cube.png" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img src="logo-cube.png" alt="" class="brand-logo" aria-hidden="true" />
        <span class="brand-text">rubik's storage</span>
      </div>
      <nav class="tabs tabs-inline" role="tablist" aria-label="Algorithm categories" id="tabs"></nav>
      <div class="header-actions">
        <button id="open-settings" class="btn btn-ghost btn-icon" type="button" aria-label="Settings" title="Settings">⚙</button>
      </div>
    </div>
  </header>

  <section class="toolbar">
    <div class="container toolbar-inner">
      <div class="search-wrap">
        <input
          id="search"
          type="search"
          placeholder="Search by name, id, algorithm, recognition…"
          autocomplete="off"
          aria-label="Search algorithms"
        />
      </div>
      <div class="filters" id="filters" aria-label="Filters"></div>
      <div class="stats" id="stats" aria-live="polite"></div>
    </div>
    <div id="selection-toolbar" class="container selection-toolbar">
      <button id="open-timer" class="btn btn-primary" type="button" title="Open speedcubing timer">Timer</button>
      <button id="open-weak-cases" class="btn" type="button" title="Surface the cases you've practiced least or are slowest on">Today's drill</button>
      <span class="selection-divider" id="selection-divider"></span>
      <button id="select-all" class="btn btn-small selection-only" type="button">Select all in tab</button>
      <button id="clear-selection" class="btn btn-small selection-only" type="button" disabled>Clear</button>
      <span id="selection-count" class="selection-count selection-only" aria-live="polite"></span>
      <span class="selection-spacer"></span>
      <button id="drill-selected" class="btn btn-primary selection-only" type="button" disabled>Drill selected</button>
      <button id="batch-selected" class="btn btn-primary selection-only" type="button" disabled title="Solve 5 cases under one continuous timer">Batch (5)</button>
      <button id="recog-selected" class="btn btn-primary selection-only" type="button" disabled>Train recognition</button>
    </div>
  </section>

  <div id="modal-root" class="modal-root hidden" aria-hidden="true"></div>

  <main class="container main">
    <div id="grid" class="grid" role="list"></div>
    <div id="empty" class="empty hidden">No algorithms match the current filters.</div>
  </main>

  <script src="app.js" type="module"></script>
  <script>
    // Register the service worker (offline support + PWA install).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.warn("Service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
