<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#11141c"/>
  <g transform="translate(64 64)">
    <!-- 3x3 sticker grid, 4 colors matching the site's brand mark -->
    <g stroke="#11141c" stroke-width="14" stroke-linejoin="round">
      <rect x="0"   y="0"   width="120" height="120" rx="14" fill="#f5c518"/>
      <rect x="132" y="0"   width="120" height="120" rx="14" fill="#f5c518"/>
      <rect x="264" y="0"   width="120" height="120" rx="14" fill="#e35d4a"/>
      <rect x="0"   y="132" width="120" height="120" rx="14" fill="#f5c518"/>
      <rect x="132" y="132" width="120" height="120" rx="14" fill="#4b6bff"/>
      <rect x="264" y="132" width="120" height="120" rx="14" fill="#e35d4a"/>
      <rect x="0"   y="264" width="120" height="120" rx="14" fill="#21a47a"/>
      <rect x="132" y="264" width="120" height="120" rx="14" fill="#4b6bff"/>
      <rect x="264" y="264" width="120" height="120" rx="14" fill="#e35d4a"/>
    </g>
  </g>
</svg>
